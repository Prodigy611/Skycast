# ── Netlify Configuration ──────────────────────────────────────────────────
# This file tells Netlify where your functions live and sets up clean URL
# routing so /api/* calls go to your serverless functions automatically.

[build]
  publish = "public"          # folder containing index.html
  functions = "netlify/functions"  # folder containing serverless functions

# Route /api/weather → weather.js function
[[redirects]]
  from = "/api/weather"
  to = "/.netlify/functions/weather"
  status = 200

# Route /api/ai-activities → ai-activities.js function
[[redirects]]
  from = "/api/ai-activities"
  to = "/.netlify/functions/ai-activities"
  status = 200

# SPA fallback — serve index.html for all other routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"   # faster cold starts

# Security headers applied to every response
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self)"
